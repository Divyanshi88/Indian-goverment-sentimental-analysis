project:
  name: Indian Government Sentiment Analysis Dashboard
  default_lookback_days: 30

# News data source configuration (switched from Reddit to NewsAPI)
news:
  api_source: newsapi.org
  country: in  # India
  language: en  # English
  page_size: 100  # Articles per query
  days_back: 7  # Look back 7 days
  sort_by: publishedAt  # Sort by publication date
  search_queries:
    - government
    - election
    - policy
    - budget
    - parliament
    - prime minister
    - indian government
    - ministry
    - cabinet
    - legislation

# Kept for reference - legacy Reddit configuration (no longer used)
# reddit:
#   subreddits:
#     - india
#     - IndiaSpeaks
#     - indianews
#     - unitedstatesofindia
#   post_limit: 150
#   comment_limit: 50

models:
  traditional_model_path: models/logistic_regression.joblib
  vectorizer_path: models/tfidf_vectorizer.joblib
  transformer_model: distilbert-base-uncased-finetuned-sst-2-english

database:
  dataset: news_government_sentiment
